plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'edu.sc.seis.launch4j' version '4.0.0'
    id 'org.panteleyev.jpackageplugin' version '1.6.0'
}

group = 'com.maple'
version = '1.0'

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://libraries.minecraft.net/' }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation 'com.github.Litarvan:OpenAuth:master-SNAPSHOT'
    implementation 'com.github.Litarvan:OpenLauncherLib:master-SNAPSHOT'
    implementation 'com.google.code.gson:gson:2.10.1'
}

// Essential JavaFX modules to keep the file size optimized
javafx {
    version = "21"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.graphics' ]
}

application {
    mainClass = 'com.maple.launcher.RunLauncher'
}

// Lightweight Runnable Fat JAR build (~7 MB)
jar {
    archiveFileName = 'MapleLauncher.jar'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': application.mainClass.get()
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

// Ultra-lightweight Launch4j EXE wrapper (~7 MB)
launch4j {
    mainClassName = 'com.maple.launcher.RunLauncher'
    outputDir = 'launch4j'
    outfile = 'MapleLauncher.exe'
    headerType = 'gui'
    requires64Bit = true
    jreMinVersion = '21'
    icon = "${projectDir}/icon.ico" // Expects icon.ico at project root
}

// Standalone installer with embedded JRE
jpackage {
    appName = 'MapleLauncher-Installer'
    appVersion = '1.0.0'
    vendor = 'Maple'
    mainJar = 'MapleLauncher.jar'
    mainClass = application.mainClass.get()
    input = "${buildDir}/libs"
    destination = "${buildDir}/dist"
    type = 'EXE'
    icon = "${projectDir}/icon.ico"
    winMenu = true
    winShortcut = true
}
