plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'edu.sc.seis.launch4j' version '4.0.0'
}

group = 'com.maple'
version = '1.0'

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://libraries.minecraft.net/' }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation 'com.github.Litarvan:OpenAuth:master-SNAPSHOT'
    implementation 'com.github.Litarvan:OpenLauncherLib:master-SNAPSHOT'
    implementation 'com.google.code.gson:gson:2.10.1'
}

javafx {
    version = "21"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.graphics' ]
}

application {
    mainClass = 'com.maple.launcher.RunLauncher'
}

// Copy dependencies to build/libs/lib
tasks.register('copyLibs', Copy) {
    into "$buildDir/libs/lib"
    from configurations.runtimeClasspath
}

jar {
    dependsOn copyLibs
    manifest {
        attributes(
            'Main-Class': application.mainClass.get(),
            // Links external jars in the lib folder
            'Class-Path': configurations.runtimeClasspath.files.collect { "lib/" + it.name }.join(' ')
        )
    }
}

launch4j {
    mainClassName = 'com.maple.launcher.RunLauncher'
    // Copy external runtime jars alongside the EXE
    copyConfigurable = []
    outputDir = 'launch4j'
    outfile = 'MapleLauncher.exe'
    headerType = 'gui'
    requires64Bit = true
    jreMinVersion = '21'
}
