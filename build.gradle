plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'org.panteleyev.jpackageplugin' version '1.6.0'
}

group = 'com.maple'
version = '1.0'

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://libraries.minecraft.net/' }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation 'com.github.Litarvan:OpenAuth:master-SNAPSHOT'
    implementation 'com.github.Litarvan:OpenLauncherLib:master-SNAPSHOT'
    implementation 'com.google.code.gson:gson:2.10.1'
}

javafx {
    version = "21"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.graphics' ]
}

application {
    mainClass = 'com.maple.launcher.RunLauncher'
}

// Built-in Gradle Fat JAR task
jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': application.mainClass.get()
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

// jpackage task configuration
jpackage {
    appName = 'MapleLauncher'
    appVersion = '1.0.0'
    vendor = 'Maple'
    mainJar = "${project.name}-${project.version}.jar"
    mainClass = application.mainClass.get()
    input = "${buildDir}/libs"
    destination = "${buildDir}/dist"
    type = 'EXE' // Generates a standalone installer (.exe)
    
    // Windows specific configuration
    winMenu = true
    winShortcut = true
}
