name: Build MapleLauncher Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Shadow JAR & Launch4j EXE
        run: ./gradlew shadowJar createExe --no-daemon

      - name: Create Release & Upload Executables
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0-${{ github.run_number }}"
          name: "MapleLauncher v1.0 (Build ${{ github.run_number }})"
          files: |
            build/libs/MapleLauncher-1.0.jar
            build/launch4j/MapleLauncher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
