name: Build MapleLauncher Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload Built Executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: MapleLauncher-JAR
          path: build/libs/MapleLauncher-1.0.jar
          retention-days: 7
