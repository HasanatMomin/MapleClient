name: Build MapleLauncher Executable & Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Calculate Dynamic SemVer Version
        id: semver
        shell: bash
        run: |
          BUILD_NUM=${{ github.run_number }}
          
          PATCH=$(( (BUILD_NUM - 1) % 10 ))
          MINOR=$(( ((BUILD_NUM - 1) / 10) % 10 ))
          MAJOR=$(( 1 + ((BUILD_NUM - 1) / 100) ))
          
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Calculated Version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Grant Execute Permission for Gradle Wrapper
        shell: bash
        run: chmod +x gradlew

      - name: Build Fat JAR, Launch4j EXE, and jpackage Installer with Dynamic Version
        run: ./gradlew.bat build createExe jpackage "-Pversion=${{ steps.semver.outputs.VERSION }}" --no-daemon

      # Upload Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MapleLauncher-v${{ steps.semver.outputs.VERSION }}
          path: |
            build/libs/MapleLauncher.jar
            build/launch4j/MapleLauncher.exe
            build/dist/*.exe
            Launch.bat
          retention-days: 30

      # Create Release on GitHub
      - name: Create Release & Upload Executables
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.semver.outputs.VERSION }}"
          name: "MapleLauncher v${{ steps.semver.outputs.VERSION }} by Maplized (Hasanat)"
          body: "Official release v${{ steps.semver.outputs.VERSION }} built by Maplized (Hasanat)."
          draft: false
          prerelease: false
          files: |
            build/libs/MapleLauncher.jar
            build/launch4j/MapleLauncher.exe
            build/dist/*.exe
            Launch.bat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
